name: PolicyMesh
description: Cross-surface AI agent policy consistency review.
author: Conal

branding:
  icon: git-compare
  color: blue

inputs:
  repo:
    description: Repository checkout path to inspect. Defaults to GITHUB_WORKSPACE.
    required: false
    default: ''
  fail-on:
    description: Severity that fails the action. Use none, low, medium, high, or critical.
    required: false
    default: none
  github-token:
    description: >-
      Optional GITHUB_TOKEN with pull-requests:write. When provided on a
      pull_request event, PolicyMesh posts the Markdown report as a sticky
      PR comment that updates in place across pushes instead of appending
      a new comment each run. Leave unset to keep behavior unchanged.
    required: false
    default: ''
  recursive:
    description: >-
      When 'true', PolicyMesh walks the repo tree and audits every
      sub-project with its own agent config independently (monorepo
      mode). Findings keep their relative file paths so CI annotations
      land on the right line. Defaults to false to preserve existing
      single-project behaviour.
    required: false
    default: 'false'
  diff:
    description: >-
      When 'true' and the workflow is running on a pull_request event,
      PolicyMesh audits the PR base in a temporary worktree, audits HEAD,
      and emits PR annotations only for findings that are NEW or WORSENED
      in this PR. The step summary and sticky comment still show the
      full head report. The fail-on threshold gates on the delta rating,
      so a PR that does not introduce new conflicts can pass even when
      the repo has pre-existing findings. Requires the base ref to be
      fetchable; use fetch-depth: 0 on actions/checkout if your repo
      uses shallow clones.
    required: false
    default: 'false'

outputs:
  rating:
    description: Highest PolicyMesh policy conflict rating.
    value: ${{ steps.run.outputs.rating }}
  finding-count:
    description: Total PolicyMesh findings in the audit.
    value: ${{ steps.run.outputs.finding-count }}
  surface-count:
    description: Number of configured agent policy surfaces found.
    value: ${{ steps.run.outputs.surface-count }}

runs:
  using: composite
  steps:
    - name: Install PolicyMesh dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund
    - name: Run PolicyMesh agent policy audit
      id: run
      shell: bash
      env:
        MESH_REPO: ${{ inputs.repo }}
        MESH_FAIL_ON: ${{ inputs.fail-on }}
        MESH_GITHUB_TOKEN: ${{ inputs.github-token }}
        MESH_RECURSIVE: ${{ inputs.recursive }}
        MESH_DIFF: ${{ inputs.diff }}
      run: |
        set -euo pipefail

        cd "${GITHUB_WORKSPACE:-.}"

        repo="${MESH_REPO:-${GITHUB_WORKSPACE:-.}}"
        fail_on="${MESH_FAIL_ON:-none}"

        report_file="${RUNNER_TEMP:-.}/policymesh-report.md"
        json_file="${RUNNER_TEMP:-.}/policymesh-report.json"

        # One audit pass — render markdown / github annotations from the
        # saved JSON rather than re-running the full audit per format.
        audit_args=(audit --repo "$repo" --format json)
        if [ "${MESH_RECURSIVE:-false}" = "true" ]; then
          audit_args+=(--recursive)
        fi
        node "$GITHUB_ACTION_PATH/dist/index.js" "${audit_args[@]}" > "$json_file"

        # GitHub annotation file paths normally get prefixed back to the
        # workflow workspace when --repo points at a sub-directory; audit
        # used to do this implicitly. Now that we render from saved JSON
        # we compute the prefix once here and pass it to render.
        annotation_prefix="$(node -e 'const {relative,resolve}=require("node:path");const p=relative(process.cwd(),resolve(process.argv[1]));process.stdout.write(p && p !== "." && !p.startsWith("..") ? p : "")' "$repo")"

        # PR-delta mode: audit the base ref in a worktree and diff against
        # HEAD. Annotations and rating gate on the delta; the markdown
        # report still shows the full head audit for context.
        annotations_source="$json_file"
        rating_source="$json_file"
        if [ "${MESH_DIFF:-false}" = "true" ] && [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ]; then
          base_sha="$(jq -r '.pull_request.base.sha // empty' "$GITHUB_EVENT_PATH")"
          if [ -n "$base_sha" ]; then
            git fetch --no-tags --depth=1 origin "$base_sha" 2>/dev/null || true
            base_dir="${RUNNER_TEMP:-.}/policymesh-base-worktree"
            if git worktree add --detach "$base_dir" "$base_sha" 2>/dev/null; then
              base_json="${RUNNER_TEMP:-.}/policymesh-base.json"
              delta_json="${RUNNER_TEMP:-.}/policymesh-delta.json"
              base_audit_args=(audit --repo "$base_dir" --format json)
              if [ "${MESH_RECURSIVE:-false}" = "true" ]; then
                base_audit_args+=(--recursive)
              fi
              node "$GITHUB_ACTION_PATH/dist/index.js" "${base_audit_args[@]}" > "$base_json"
              git worktree remove --force "$base_dir" 2>/dev/null || true

              node "$GITHUB_ACTION_PATH/dist/index.js" diff \
                --base-report "$base_json" \
                --head-report "$json_file" \
                --format json > "$delta_json"
              annotations_source="$delta_json"
              rating_source="$delta_json"
            else
              echo "::notice::PolicyMesh diff requested but base ref $base_sha could not be checked out (try fetch-depth: 0). Falling back to full head report for annotations."
            fi
          fi
        fi

        node "$GITHUB_ACTION_PATH/dist/index.js" render --input "$json_file" --format markdown | tee "$report_file"
        if [ -n "$annotation_prefix" ]; then
          node "$GITHUB_ACTION_PATH/dist/index.js" render --input "$annotations_source" --format github --annotation-path-prefix "$annotation_prefix"
        else
          node "$GITHUB_ACTION_PATH/dist/index.js" render --input "$annotations_source" --format github
        fi

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$report_file" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Sticky PR comment — only when a token is supplied and we're in a
        # pull_request event. Uses an HTML marker to find-and-update the
        # existing comment in place rather than spam a new one per push.
        if [ -n "${MESH_GITHUB_TOKEN:-}" ] && [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ]; then
          pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
          if [ -n "$pr_number" ]; then
            marker='<!-- policymesh:pr-summary -->'
            comment_file="${RUNNER_TEMP:-.}/policymesh-comment.md"
            {
              printf '%s\n\n' "$marker"
              cat "$report_file"
            } > "$comment_file"

            existing="$(GH_TOKEN="$MESH_GITHUB_TOKEN" gh api \
              "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
              --paginate \
              --jq ".[] | select(.body != null and (.body | contains(\"$marker\"))) | .id" \
              | head -n 1)"

            if [ -n "$existing" ]; then
              GH_TOKEN="$MESH_GITHUB_TOKEN" gh api -X PATCH \
                "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" \
                -F body=@"$comment_file" > /dev/null
            else
              GH_TOKEN="$MESH_GITHUB_TOKEN" gh api -X POST \
                "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
                -F body=@"$comment_file" > /dev/null
            fi
          fi
        fi

        # Outputs reflect the gating source: delta in PR-delta mode,
        # full head report otherwise. surface_count always reflects the
        # full repo so users can see total surface coverage.
        rating="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).rating)" "$rating_source")"
        finding_count="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).findings.length)" "$rating_source")"
        surface_count="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).data.surfaceCount)" "$json_file")"
        echo "rating=$rating" >> "$GITHUB_OUTPUT"
        echo "finding-count=$finding_count" >> "$GITHUB_OUTPUT"
        echo "surface-count=$surface_count" >> "$GITHUB_OUTPUT"

        rank() {
          case "$1" in
            none) echo 0 ;;
            low) echo 1 ;;
            medium) echo 2 ;;
            high) echo 3 ;;
            critical) echo 4 ;;
            *) echo -1 ;;
          esac
        }

        fail_rank="$(rank "$fail_on")"
        rating_rank="$(rank "$rating")"

        if [ "$fail_rank" -lt 0 ]; then
          echo "::error::Invalid fail-on value '$fail_on'. Use none, low, medium, high, or critical."
          exit 2
        fi

        if [ "$fail_rank" -gt 0 ] && [ "$rating_rank" -ge "$fail_rank" ]; then
          echo "::error::PolicyMesh policy conflict rating $rating meets fail-on threshold $fail_on."
          exit 1
        fi
